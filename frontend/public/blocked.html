<!doctype html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="robots" content="noindex, nofollow">
<title>Truy cập bị từ chối</title>
<style>
  * { box-sizing: border-box; }
  body {
    margin: 0;
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    background: #0F172A;
    color: #E2E8F0;
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
    padding: 24px;
  }
  .card {
    max-width: 560px;
    width: 100%;
    text-align: center;
  }
  .icon {
    width: 84px;
    height: 84px;
    margin: 0 auto 28px;
    border-radius: 50%;
    background: #7F1D1D;
    display: flex;
    align-items: center;
    justify-content: center;
  }
  h1 {
    font-size: 1.7rem;
    font-weight: 700;
    margin: 0 0 12px;
    color: #F8FAFC;
  }
  p.sub {
    color: #94A3B8;
    font-size: 1rem;
    line-height: 1.6;
    margin: 0 0 32px;
  }
  .box {
    background: #1E293B;
    border: 1px solid #334155;
    border-radius: 10px;
    padding: 20px 24px;
    text-align: left;
  }
  .box h2 {
    font-size: 0.95rem;
    font-weight: 600;
    color: #FBBF24;
    margin: 0 0 8px;
  }
  .box p {
    font-size: 0.88rem;
    color: #CBD5E1;
    line-height: 1.6;
    margin: 0;
  }
</style>
</head>
<body>
  <div class="card">
    <div class="icon">
      <svg width="38" height="38" viewBox="0 0 24 24" fill="none" stroke="#FCA5A5" stroke-width="2.5" stroke-linecap="round">
        <line x1="6" y1="6" x2="18" y2="18"/>
        <line x1="18" y1="6" x2="6" y2="18"/>
      </svg>
    </div>
    <h1>Rất tiếc, bạn đã bị chặn truy cập</h1>
    <p class="sub">Địa chỉ IP của bạn hiện không thể truy cập trang web này.</p>
    <div class="box">
      <h2>Vì sao tôi bị chặn?</h2>
      <p>Hệ thống ghi nhận hoạt động bất thường từ địa chỉ IP này (ví dụ: đăng nhập sai liên tục), quản trị viên đã chặn truy cập để bảo vệ hệ thống.</p>
    </div>
  </div>
</body>
</html>
