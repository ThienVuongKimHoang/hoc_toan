server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    client_max_body_size 50M;

    # Subrequest nội bộ: hỏi backend xem IP hiện tại có nằm trong banned_ips không.
    # Trả 200 nếu được phép, 403 nếu bị cấm (xem api.py: _block_banned_ips + /api/security/check-ip).
    location = /_check_ip {
        internal;
        proxy_pass http://backend:8000/api/security/check-ip;
        proxy_pass_request_body off;
        proxy_set_header Content-Length "";
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }

    # IP bị cấm sẽ nhận thẳng trang này thay vì bất kỳ nội dung nào của site.
    error_page 403 /blocked.html;
    location = /blocked.html {
        internal;
    }

    location / {
        auth_request /_check_ip;
        try_files $uri $uri/ /index.html;
    }

    location /api/ {
        auth_request /_check_ip;
        proxy_pass http://backend:8000/api/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;

        # SSE / streaming
        proxy_buffering off;
        proxy_cache off;
        proxy_read_timeout 300s;
        proxy_http_version 1.1;
        chunked_transfer_encoding on;
    }

    location /images/ {
        auth_request /_check_ip;
        proxy_pass http://backend:8000/images/;
        proxy_set_header Host $host;
    }

    location /class-docs/ {
        auth_request /_check_ip;
        proxy_pass http://backend:8000/class-docs/;
        proxy_set_header Host $host;
    }

    location /uploads/ {
        auth_request /_check_ip;
        proxy_pass http://backend:8000/uploads/;
        proxy_set_header Host $host;
    }
}
